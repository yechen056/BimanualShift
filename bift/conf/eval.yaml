defaults:
    - method: BIMANUALSHIFT_PERACT


rlbench:
    task_name: "multi"
    tasks: [dual_push_buttons]
    demo_path: /home/yechen/BimanualShift/data/rlbench_data/train
    episode_length: 25
    cameras: ["over_shoulder_left", "over_shoulder_right", "overhead", "wrist_right", "wrist_left", "front"]
    camera_resolution: [256, 256]
    scene_bounds: [-0.3, -0.5, 0.6, 0.7, 0.5, 1.6]
    include_lang_goal_in_obs: True
    time_in_state: True
    headless: True
    gripper_mode: 'Discrete'
    arm_action_mode: 'EndEffectorPoseViaPlanning'
    action_mode: 'MoveArmThenGripper'

framework:
    tensorboard_logging: True
    csv_logging: True
    gpu: 0
    logdir: 'peract_lf_ab_eval'
    start_seed: 0
    record_every_n: 1

    eval_envs: 1
    eval_from_eps_number: 0
    eval_episodes: 40
    eval_type: 60000 # or 'best', 'missing', or 'last'
    eval_save_metrics: True

cinematic_recorder:
    enabled: True
    camera_resolution: [1280, 720]
    fps: 30
    rotate_speed: 0.005
    save_path: '/tmp/videos/'
